{% extends 'base.html' %}
{% load static %}

{% block title %}Entrar - Departamento Pessoal{% endblock %}

{% block content %}
<div class="container-login">
    <div class="login-card">
        <img src="{% static 'images/logo.png' %}" alt="Logo Departamento Pessoal" class="login-logo">
        <h1 class="login-title">Acesso Restrito</h1>
        <p class="login-subtitle">Dashboard de Atestados - Departamento Pessoal</p>

        {% if error_msg %}
        <div class="error-list">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ error_msg }}
        </div>
        {% endif %}

        <form method="post" id="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Digite seu usuário" required autofocus>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Senha</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="submit-login">
                <i class="fa-solid fa-key"></i> Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
